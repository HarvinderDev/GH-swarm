version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: swarm
    ports:
      - '5432:5432'
  redis:
    image: redis:7
    ports:
      - '6379:6379'
  api:
    image: node:22
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @swarm/api dev"
    env_file: .env.example
    ports:
      - '4000:4000'
    depends_on:
      - db
      - redis
  worker:
    image: node:22
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @swarm/worker dev"
    env_file: .env.example
    depends_on:
      - api
  web:
    image: node:22
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @swarm/web dev"
    env_file: .env.example
    ports:
      - '3000:3000'
    depends_on:
      - api
