version: "3.9"

services:
  web:
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-lc", "echo 'web placeholder started on 3000'; sleep infinity"]
    env_file:
      - .env
    environment:
      WEB_PORT: ${WEB_PORT:-3000}
      API_BASE_URL: http://api:${API_PORT:-4000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

  api:
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-lc", "echo 'api placeholder started on 4000'; sleep infinity"]
    env_file:
      - .env
    environment:
      API_PORT: ${API_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/swarm}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      - db
      - redis

  worker:
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-lc", "echo 'worker placeholder started'; sleep infinity"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/swarm}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
    depends_on:
      - api
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: swarm
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

volumes:
  db-data:
  redis-data:
